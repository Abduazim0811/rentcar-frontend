name: Build and Deploy RentCar Frontend

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  FRONTEND_IMAGE: ghcr.io/abduazim0811/rentcar-frontend:latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build --no-cache \
            --build-arg VITE_API_URL=/api/v1 \
            -t $FRONTEND_IMAGE \
            -t ghcr.io/abduazim0811/rentcar-frontend:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push $FRONTEND_IMAGE
          docker push ghcr.io/abduazim0811/rentcar-frontend:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Restart frontend on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          envs: GHCR_TOKEN
          script: |
            echo "Logging in to GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u abduazim0811 --password-stdin

            echo "Pulling latest frontend image..."
            docker compose --env-file ~/rentcar/.env -f ~/rentcar/docker-compose.yml pull frontend

            echo "Restarting frontend..."
            docker compose --env-file ~/rentcar/.env -f ~/rentcar/docker-compose.yml up -d frontend

            echo "Frontend deployment successful!"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
